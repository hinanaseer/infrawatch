name: InfraWatch — Multi-Cloud CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_NAME: infrawatch
  APP_VERSION: ${{ github.run_number }}
  IMAGE_NAME: infra-health-dashboard

jobs:
  # ── Job 1: Test ──────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd app
          python -c "
          from app import app
          client = app.test_client()
          assert client.get('/health').status_code == 200
          assert client.get('/').status_code == 200
          assert client.get('/metrics').status_code == 200
          print('✅ All health checks passed')
          "

  # ── Job 2: Build & Push Docker Image ─────────────────────
  build-and-push:
    name: 🐳 Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        run: |
          docker build \
            --tag ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}:latest \
            ./app
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}:latest

  # ── Job 3: Deploy to AWS EC2 ─────────────────────────────
  deploy-aws:
    name: 🚀 Deploy → AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: aws-production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.AWS_EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.AWS_EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin \
              ${{ steps.ecr-login.outputs.registry }}
            docker pull ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
            docker stop infrawatch-app 2>/dev/null || true
            docker rm   infrawatch-app 2>/dev/null || true
            docker run -d \
              --name infrawatch-app \
              --restart always \
              -p 80:8888 \
              -e APP_ENV=production \
              -e APP_VERSION=${{ env.APP_VERSION }} \
              -e CLOUD_PROVIDER=aws \
              ${{ steps.ecr-login.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
            sleep 5
            curl -f http://localhost/health || exit 1
            echo "✅ AWS deployment successful"

  # ── Job 4: Notify ─────────────────────────────────────────
  notify:
    name: 📢 Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-aws]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "=================================="
          echo "  INFRAWATCH DEPLOYMENT COMPLETE"
          echo "=================================="
          echo "  Version : ${{ env.APP_VERSION }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  AWS     : ${{ needs.deploy-aws.result }}"
          echo "  Time    : $(date -u)"
          echo "=================================="